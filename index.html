<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huemood</title>
  <meta name="description" content="Every day has a color. Pick the one that feels right and build your personal color diary. Huemood for iOS.">
  <meta property="og:title" content="Huemood">
  <meta property="og:description" content="Track your mood without words!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://huemood.app">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Staatliches&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAFA;
      --text: #10100F;
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.06), inset 0 0 0 0.5px rgba(255, 255, 255, 0.6);
      --active-tab-bg: rgba(0, 0, 0, 0.12);
      --tab-text: #1a1a1a;
      --tab-active-accent: #1a1a1a;
      --subtitle: rgba(16, 16, 15, 0.5);
      --btn-bg: rgba(0, 0, 0, 0.08);
    }

    html.dark {
      --bg: #1D1D1B;
      --text: #FFFFFE;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.2), inset 0 0 0 0.5px rgba(255, 255, 255, 0.1);
      --active-tab-bg: rgba(255, 255, 255, 0.14);
      --tab-text: #f5f5f5;
      --tab-active-accent: #f5f5f5;
      --subtitle: rgba(255, 255, 254, 0.45);
      --btn-bg: rgba(255, 255, 255, 0.1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      transition: background 0.4s ease;
    }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      padding: 40px 20px;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 4px;
      border-radius: 296px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(1.8) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(1.1);
      box-shadow: var(--glass-shadow);
      border: none;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 18px;
      border: none;
      border-radius: 296px;
      background: transparent;
      color: var(--tab-text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transition: fill 0.25s ease;
    }

    .tab.active {
      background: var(--active-tab-bg);
      color: var(--tab-active-accent);
    }

    .tab:not(.active):hover {
      opacity: 0.7;
    }

    /* ── Center Group ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: -40px;
    }

    .title {
      font-family: 'Staatliches', cursive;
      font-size: 120px;
      font-weight: 400;
      color: var(--text);
      line-height: 1;
      letter-spacing: 2px;
      transition: color 0.4s ease;
      text-transform: uppercase;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--subtitle);
      margin-top: 8px;
      transition: color 0.4s ease;
    }

    /* ── Download Button ── */
    .download-btn {
      margin-top: 72px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      border-radius: 296px;
      background: var(--btn-bg);
      backdrop-filter: blur(40px) saturate(1.8) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(1.1);
      box-shadow: var(--glass-shadow);
      border: none;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.4s ease, box-shadow 0.4s ease, color 0.4s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .download-btn:hover {
      transform: scale(1.05);
      background: var(--active-tab-bg);
    }

    .download-btn:active {
      transform: scale(0.97);
    }

    /* ── Responsive ── */
    /* ── Appear Animation ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      animation: fadeUp 0.5s ease-out both;
    }

    .subtitle {
      animation: fadeUp 0.5s ease-out 0.2s both;
    }

    .download-btn {
      animation: fadeUp 0.5s ease-out 0.4s both;
    }

    @media (max-width: 600px) {
      .content {
        padding: 28px 16px;
      }

      .title {
        font-size: 56px;
        letter-spacing: 1px;
      }

      .subtitle {
        font-size: 16px;
      }

      .download-btn {
        font-size: 15px;
        padding: 10px 24px;
      }
    }

    @media (max-width: 360px) {
      .title {
        font-size: 44px;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <div class="tab-bar" role="tablist">
      <button class="tab active" data-mode="light" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Light
      </button>
      <button class="tab" data-mode="dark" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        Dark
      </button>
    </div>

    <div class="center">
      <h1 class="title">Huemood</h1>
      <p class="subtitle">track your mood without words</p>
      <a href="https://testflight.apple.com/join/3UBJP7T2" class="download-btn">Try Beta on TestFlight</a>
    </div>
  </div>

  <script>
    // ── Canvas Setup ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let w, h;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * DPR;
      canvas.height = h * DPR;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();

    // ── Mood Colors (RGB) ──
    const COLORS = [
      [221, 71, 39],   // Red
      [231, 121, 171], // Pink
      [167, 137, 215], // Purple
      [33, 70, 141],   // Navy
      [116, 164, 102], // Green
      [254, 207, 93],  // Yellow
      [241, 134, 19],  // Orange
      [100, 192, 192], // Blue
    ];

    // ── Lerp between two RGB colors ──
    function lerp(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t,
      ];
    }

    // ── Get color at a given time, smoothly cycling through all colors ──
    var colorDuration = 3; // seconds per color
    function getColor(time) {
      var total = COLORS.length * colorDuration;
      var t = (time % total) / colorDuration;
      var i = Math.floor(t);
      var frac = t - i;
      // Smooth easing
      frac = frac * frac * (3 - 2 * frac);
      var from = COLORS[i % COLORS.length];
      var to = COLORS[(i + 1) % COLORS.length];
      return lerp(from, to, frac);
    }

    // ── Dark Mode State ──
    let isDark = false;

    // ── Draw Loop ──
    function draw(time) {
      var t = time * 0.001;

      // Background fill
      ctx.fillStyle = isDark ? '#1D1D1B' : '#FAFAFA';
      ctx.fillRect(0, 0, w, h);

      // Blob position — slow organic drift
      var cx = (0.35 + 0.3 * Math.sin(t * 0.2)) * w;
      var cy = (0.55 + 0.25 * Math.cos(t * 0.15)) * h;
      var r = Math.min(w, h) * 0.65;

      // Current color
      var c = getColor(t);
      var alpha = isDark ? 0.7 : 0.7;

      // Draw soft radial blob
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      var rc = Math.round(c[0]), gc = Math.round(c[1]), bc = Math.round(c[2]);
      grad.addColorStop(0, 'rgba(' + rc + ',' + gc + ',' + bc + ',' + alpha + ')');
      grad.addColorStop(0.25, 'rgba(' + rc + ',' + gc + ',' + bc + ',' + (alpha * 0.6) + ')');
      grad.addColorStop(0.5, 'rgba(' + rc + ',' + gc + ',' + bc + ',' + (alpha * 0.25) + ')');
      grad.addColorStop(0.75, 'rgba(' + rc + ',' + gc + ',' + bc + ',' + (alpha * 0.06) + ')');
      grad.addColorStop(1, 'rgba(' + rc + ',' + gc + ',' + bc + ',0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    // ── Tab Toggle ──
    var html = document.documentElement;
    var tabs = document.querySelectorAll('.tab');

    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var mode = this.getAttribute('data-mode');
        isDark = (mode === 'dark');
        html.classList.toggle('dark', isDark);

        tabs.forEach(function(t) {
          var isActive = t === tab;
          t.classList.toggle('active', isActive);
          t.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
      });
    });
  </script>
</body>
</html>
